# Deploy to Fly.io: fly launch --copy-config --no-deploy && fly deploy
# First time: install flyctl from https://fly.io/docs/getting-started/installing-flyctl/

app = "strata-dig"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "strata_data"
  destination = "/app/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
